project:
  type: single-app
  techStack: [django, python]

workflow:
  complexity:
    S: { maxFiles: 3, singleDomain: true }
    M: { maxFiles: 10, maxDomains: 2 }
    L: { maxFiles: 20, maxDomains: 3 }
    XL: "everything else"
  autoQuickFix: true
  autoMerge: false
  maxRetries: 2
  requireArchReview: [XL]

triggers:
  retro:
    cadence: bi-weekly
    mergeThreshold: 5
  gapAnalysis:
    cadence: weekly
    postMergeFor: [L, XL]
  architectureReview:
    cadence: monthly
  securityReview:
    autoFor: [auth, views, middleware]

budget:
  perSession:
    QUICK_FIX: 1.00
    TRIAGE: 2.00
    BRAINSTORM: 4.00
    PLAN: 3.00
    EXECUTE: 4.00
    REVIEW: 2.00
    INTEGRATION_CHECK: 2.00
    MERGE: 0.50
    GAP_ANALYSIS: 2.00
    RETRO: 2.00
    POST_MORTEM: 3.00
    ARCHITECTURE_REVIEW: 3.00
    SECURITY_REVIEW: 2.00
    RELEASE: 3.00
    DOCS_SYNC: 2.00
    ONBOARD: 2.00
    HOTFIX: 8.00
    DEPENDENCY_AUDIT: 2.00
  monthlyWarning: 120
  monthlyHardCap: 0
  preferredModels:
    governance: sonnet
    development: sonnet
    testing: sonnet
    quickfix: sonnet
    docs: sonnet

hitl:
  mergeApproval: [L, XL]
  budgetApproval: 10.00
  silentMode: false

git:
  releaseBranch: "release/next"
  mainBranch: "main"
  commitPrefix: "conventional"
  tagFormat: "v{version}"

defaultAgentConfig:
  development:
    model: sonnet
    testCommand: "python manage.py test"
    testFramework: pytest
  testing:
    model: sonnet
    testCommand: "python -m pytest --cov"
    testFramework: pytest

domainDetection:
  strategy: "directory-scan"
  patterns:
    - match: "*/models.py"
      type: "django-app"
    - match: "*/views.py"
      type: "django-app"
    - match: "*/apps.py"
      type: "django-app"
    - match: "*/serializers.py"
      type: "drf-api"
