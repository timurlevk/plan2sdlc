<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDLC Dashboard — Plan2Skill</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117; color: #c9d1d9;
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Status bar */
    .status-bar {
      height: 36px; background: #161b22;
      display: flex; align-items: center;
      padding: 0 16px; gap: 24px;
      border-bottom: 1px solid #30363d;
      font-size: 13px;
    }
    .status-bar .brand {
      font-weight: 600; color: #58a6ff;
    }
    .status-bar .stat {
      color: #8b949e;
    }
    .status-bar .stat span {
      color: #c9d1d9; font-weight: 500;
    }

    /* Main content */
    .main {
      flex: 1; display: flex; overflow: hidden;
    }

    /* Office panel */
    .office-panel {
      flex: 0 0 65%; background: #0d1117;
      display: flex; flex-direction: column;
      border-right: 1px solid #30363d;
    }
    .office-canvas-container {
      flex: 1; position: relative;
      overflow: hidden;
    }
    #office-canvas {
      width: 100%; height: 100%;
      image-rendering: pixelated;
    }
    .office-placeholder {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; color: #8b949e;
    }
    .office-placeholder h2 { color: #58a6ff; margin-bottom: 8px; }

    /* Agent info popup */
    .agent-popup {
      display: none; position: absolute;
      background: #1c2128; border: 1px solid #30363d;
      border-radius: 8px; padding: 12px 16px;
      min-width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .agent-popup.visible { display: block; }
    .agent-popup .agent-name { font-weight: 600; color: #58a6ff; font-size: 14px; }
    .agent-popup .agent-role { color: #8b949e; font-size: 12px; margin-top: 2px; }
    .agent-popup .agent-status { margin-top: 8px; font-size: 12px; }

    /* Terminal panel */
    .terminal-panel {
      flex: 0 0 35%; display: flex; flex-direction: column;
      background: #0d1117;
    }
    .terminal-header {
      height: 36px; background: #161b22;
      display: flex; align-items: center;
      padding: 0 12px; border-bottom: 1px solid #30363d;
      font-size: 13px; font-weight: 600;
    }
    .terminal-header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-right: 8px;
    }
    .terminal-header .dot.green { background: #3fb950; }
    .terminal-header .dot.yellow { background: #d29922; }
    .terminal-header .dot.red { background: #f85149; }
    #terminal-container {
      flex: 1; padding: 4px;
    }

    /* Progress bar */
    .progress-bar {
      height: 40px; background: #161b22;
      display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
      border-top: 1px solid #30363d;
      font-size: 12px; overflow-x: auto;
    }
    .progress-step {
      display: flex; align-items: center; gap: 4px;
      white-space: nowrap;
    }
    .progress-step.done { color: #3fb950; }
    .progress-step.active { color: #58a6ff; font-weight: 600; }
    .progress-step.pending { color: #484f58; }
    .progress-arrow { color: #30363d; }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="brand">SDLC Dashboard</div>
    <div class="stat">Tasks: <span id="stat-tasks">0</span></div>
    <div class="stat">Active: <span id="stat-active">0</span></div>
    <div class="stat">Cost: <span id="stat-cost">$0.00</span></div>
    <div class="stat" style="margin-left:auto; color:#484f58;">Plan2Skill</div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Office Panel -->
    <div class="office-panel">
      <div class="office-canvas-container">
        <canvas id="office-canvas"></canvas>
        <div class="office-placeholder" id="office-placeholder">
          <h2>Pixel Office</h2>
          <p>Agent visualization</p>
          <p style="margin-top:12px; font-size:12px;">Agents will appear here when workflows are active</p>
          <div id="agent-grid" style="margin-top:20px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center;"></div>
        </div>
        <div class="agent-popup" id="agent-popup">
          <div class="agent-name" id="popup-name"></div>
          <div class="agent-role" id="popup-role"></div>
          <div class="agent-status" id="popup-status"></div>
        </div>
      </div>
    </div>

    <!-- Terminal Panel -->
    <div class="terminal-panel">
      <div class="terminal-header">
        <div class="dot green" id="terminal-dot"></div>
        SDLC Orchestrator
      </div>
      <div id="terminal-container"></div>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-bar" id="progress-bar">
    <span style="color:#8b949e;">No active workflow</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    // ===== Terminal Setup =====
    const term = new Terminal({
      theme: {
        background: '#0d1117',
        foreground: '#c9d1d9',
        cursor: '#58a6ff',
        selectionBackground: '#264f78',
        black: '#484f58',
        red: '#ff7b72',
        green: '#3fb950',
        yellow: '#d29922',
        blue: '#58a6ff',
        magenta: '#bc8cff',
        cyan: '#39d353',
        white: '#c9d1d9',
      },
      fontSize: 13,
      fontFamily: "'Cascadia Code', 'Fira Code', 'Consolas', monospace",
      cursorBlink: true,
      scrollback: 5000,
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal-container'));
    fitAddon.fit();

    // Terminal WebSocket
    let termWs;
    function connectTerminal() {
      termWs = new WebSocket(`ws://${location.host}/ws/terminal`);

      termWs.onopen = () => {
        document.getElementById('terminal-dot').className = 'dot green';
        termWs.send(JSON.stringify({
          type: 'resize',
          cols: term.cols,
          rows: term.rows
        }));
      };

      termWs.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'output') {
          term.write(msg.data);
        } else if (msg.type === 'exit') {
          term.write('\r\n\x1b[33m[Session ended. Refresh to restart.]\x1b[0m\r\n');
          document.getElementById('terminal-dot').className = 'dot red';
        }
      };

      termWs.onclose = () => {
        document.getElementById('terminal-dot').className = 'dot yellow';
        term.write('\r\n\x1b[33m[Disconnected. Reconnecting...]\x1b[0m\r\n');
        setTimeout(connectTerminal, 2000);
      };

      termWs.onerror = () => {
        document.getElementById('terminal-dot').className = 'dot red';
      };
    }

    term.onData((data) => {
      if (termWs && termWs.readyState === WebSocket.OPEN) {
        termWs.send(JSON.stringify({ type: 'input', data }));
      }
    });

    term.onResize(({ cols, rows }) => {
      if (termWs && termWs.readyState === WebSocket.OPEN) {
        termWs.send(JSON.stringify({ type: 'resize', cols, rows }));
      }
    });

    connectTerminal();

    // ===== State Updates =====
    let stateWs;
    function connectState() {
      stateWs = new WebSocket(`ws://${location.host}/ws/state`);

      stateWs.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'state') {
          updateDashboard(msg.data);
        }
      };

      stateWs.onclose = () => {
        setTimeout(connectState, 3000);
      };
    }
    connectState();

    // Initial state load
    fetch('/api/state')
      .then(r => r.json())
      .then(updateDashboard)
      .catch(() => {});

    // Parse simple YAML registry (extract agent names)
    // Parse YAML registry — supports two formats:
    // Format A (map): "  agent-name:\n    type: developer\n    domain: api\n    status: active"
    // Format B (list): "  - name: agent-name\n    category: development"
    function parseRegistry(yamlStr) {
      if (!yamlStr) return [];
      const agents = [];
      const lines = yamlStr.split('\n');
      let currentAgent = null;
      let inAgents = false;

      for (const line of lines) {
        // Detect "agents:" section
        if (line.match(/^agents:\s*$/)) { inAgents = true; continue; }
        if (!inAgents) continue;
        // Skip comments
        if (line.trim().startsWith('#') || line.trim() === '') continue;
        // Exit agents section on non-indented non-comment line
        if (inAgents && line.match(/^\S/) && !line.match(/^agents:/)) { inAgents = false; continue; }

        // Format A: "  agent-name:" (2-space indent, key with colon, no value or sub-key)
        const mapKeyMatch = line.match(/^  (\w[\w-]*):\s*$/);
        if (mapKeyMatch) {
          currentAgent = { name: mapKeyMatch[1], category: 'development', status: 'active' };
          agents.push(currentAgent);
          continue;
        }

        // Format B: "  - name: value"
        const listNameMatch = line.match(/^\s*-?\s*name:\s*(.+)/);
        if (listNameMatch) {
          currentAgent = { name: listNameMatch[1].trim().replace(/['"]/g, ''), category: 'development', status: 'active' };
          agents.push(currentAgent);
          continue;
        }

        // Parse sub-fields for current agent
        if (currentAgent) {
          const fieldMatch = line.match(/^\s{4,}(\w+):\s*(.+)/);
          if (fieldMatch) {
            const [, key, val] = fieldMatch;
            const v = val.trim().replace(/['"]/g, '');
            if (key === 'type') {
              // Map type → category for display
              const typeMap = { orchestrator: 'governance', developer: 'development', tester: 'testing',
                governance: 'governance', sme: 'consultant', specialist: 'specialist' };
              currentAgent.category = typeMap[v] || v;
            }
            if (key === 'category') currentAgent.category = v;
            if (key === 'status') currentAgent.status = v;
            if (key === 'domain') currentAgent.domain = v;
            if (key === 'tier') currentAgent.tier = v;
          }
        }
      }
      return agents;
    }

    function updateDashboard(state) {
      const backlog = state.backlog;
      const items = Array.isArray(backlog) ? backlog : (backlog?.items || []);
      const activeItems = items.filter(i => !['done', 'abandoned'].includes(i.status));
      document.getElementById('stat-tasks').textContent = activeItems.length;

      const workflows = state.workflow?.activeWorkflows || [];
      document.getElementById('stat-active').textContent = workflows.length;

      const totalCost = items.reduce((sum, i) => sum + (i.actualCost || 0), 0);
      document.getElementById('stat-cost').textContent = '$' + totalCost.toFixed(2);

      const registryAgents = parseRegistry(state.registry);
      updateAgentGrid(workflows, items, registryAgents);
      updateProgressBar(workflows, items);
    }

    function updateAgentGrid(workflows, items, registryAgents) {
      const grid = document.getElementById('agent-grid');
      if (!grid) return;

      // Use registry agents if available, otherwise defaults
      let agents = registryAgents.length > 0
        ? registryAgents.filter(a => a.status !== 'disabled')
        : [
            { name: 'orchestrator', category: 'governance' },
            { name: 'architect', category: 'governance' },
            { name: 'reviewer', category: 'governance' },
          ];

      // Determine which agents are active in current workflows
      const activeAgentNames = new Set();
      for (const wf of workflows) {
        activeAgentNames.add('orchestrator');
        if (wf.domains) {
          for (const d of wf.domains) {
            activeAgentNames.add(d + '-developer');
            activeAgentNames.add(d + '-tester');
          }
        }
        // Add session-specific agents
        const session = wf.currentSession || '';
        if (session === 'REVIEW') activeAgentNames.add('governance-reviewer');
        if (session === 'BRAINSTORM') activeAgentNames.add('governance-architect');
        if (session === 'PLAN') activeAgentNames.add('governance-architect');
      }

      const categoryColors = {
        governance: '#58a6ff', development: '#3fb950', testing: '#d29922',
        design: '#bc8cff', product: '#f778ba', specialist: '#39d353',
        consultant: '#8b949e', business: '#f0883e', bridge: '#484f58',
      };

      const categoryIcons = {
        governance: '👔', development: '🧑‍💻', testing: '🧪',
        design: '🎨', product: '📊', specialist: '🔧',
        consultant: '🎓', business: '📈', bridge: '🔗',
      };

      grid.innerHTML = agents.slice(0, 20).map(agent => {
        const cat = agent.category || 'governance';
        const color = categoryColors[cat] || '#8b949e';
        const icon = categoryIcons[cat] || '🤖';
        const isActive = activeAgentNames.has(agent.name) || workflows.length > 0 && agent.name === 'orchestrator';
        const borderColor = isActive ? color : '#30363d';
        const opacity = isActive ? '1' : '0.5';

        return `<div style="
          background:#1c2128; border:2px solid ${borderColor}; border-radius:8px;
          padding:8px 12px; text-align:center; min-width:90px; cursor:pointer;
          opacity:${opacity}; transition: all 0.3s;
        " onclick="showAgentPopup(event, '${agent.name}', '${cat}', ${isActive})">
          <div style="font-size:20px;">${icon}</div>
          <div style="font-size:10px; color:${color}; margin-top:2px; font-weight:${isActive ? '600' : '400'};">${agent.name}</div>
          ${isActive ? '<div style="font-size:8px; color:#3fb950; margin-top:2px;">● active</div>' : ''}
        </div>`;
      }).join('');

      // Hide placeholder text if we have agents
      const placeholder = document.getElementById('office-placeholder');
      if (placeholder) {
        const h2 = placeholder.querySelector('h2');
        const ps = placeholder.querySelectorAll('p');
        if (h2) h2.textContent = workflows.length > 0 ? '🏢 Agent Team' : '🏢 Pixel Office';
        if (ps[0]) ps[0].textContent = workflows.length > 0 ? `${activeAgentNames.size} agents active` : `${agents.length} agents registered`;
        if (ps[1]) ps[1].textContent = workflows.length > 0 ? '' : 'Dispatch a task to see agents in action';
      }
    }

    function updateProgressBar(workflows, items) {
      const bar = document.getElementById('progress-bar');
      if (workflows.length === 0) {
        bar.innerHTML = '<span style="color:#8b949e;">No active workflow — describe a task in the terminal to start</span>';
        return;
      }

      const wf = workflows[0];
      const chain = wf.sessionChain || [wf.currentSession || 'EXECUTE'];
      const current = wf.currentSession || chain[0];
      const currentIdx = chain.indexOf(current);

      const task = items.find(i => i.id === wf.backlogItemId);
      const taskLabel = task ? `${task.id}: ${task.title}` : wf.backlogItemId || 'workflow';

      bar.innerHTML = `<span style="color:#58a6ff; font-weight:600; margin-right:12px;">📋 ${taskLabel}</span>` +
        chain.map((step, i) => {
          let cls = 'pending';
          let icon = '⬚';
          if (i < currentIdx) { cls = 'done'; icon = '✅'; }
          else if (i === currentIdx) { cls = 'active'; icon = '▶'; }
          return `<span class="progress-step ${cls}">${icon} ${step}</span>` +
            (i < chain.length - 1 ? '<span class="progress-arrow">→</span>' : '');
        }).join('');
    }

    function showAgentPopup(event, name, category, isActive) {
      const popup = document.getElementById('agent-popup');
      document.getElementById('popup-name').textContent = name;
      document.getElementById('popup-role').textContent = (category || 'agent').charAt(0).toUpperCase() + (category || 'agent').slice(1);
      document.getElementById('popup-status').innerHTML = isActive
        ? '<span style="color:#3fb950;">● Active</span>'
        : '<span style="color:#8b949e;">○ Idle</span>';
      popup.style.left = event.clientX + 'px';
      popup.style.top = event.clientY + 'px';
      popup.classList.add('visible');

      setTimeout(() => popup.classList.remove('visible'), 3000);
    }

    // Handle resize
    window.addEventListener('resize', () => {
      fitAddon.fit();
    });

    // Click outside popup closes it
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.agent-popup') && !e.target.closest('[onclick]')) {
        document.getElementById('agent-popup').classList.remove('visible');
      }
    });
  </script>
</body>
</html>
